<script>
    let cars = ['Tata', 'Honda', 'Maruti', 'Hyundai'];

    // 1. for loop
    for (let i = 0; i < cars.length; i++) {
        console.log(cars[i]);
    }
    console.log("================")

    // for-in loop
    for (let ind in cars) {
        console.log(cars[ind]);
    }
    console.log("================")

    // for-of loop
    for (let car of cars) {
        console.log(car);
    }
</script>
