<script>
    class Student {
        firstName = 'Virat';
        lastName = 'Kohli';
        fullName1() { // this - how the function is called ( this = Student )
            console.log('FullName-1: ', this);
            console.log(this.firstName, this.lastName);
        }
        fullName2 = () => { // this - where the function is written ( this = Student )
            console.log('FullName-2: ', this);
            console.log(this.firstName, this.lastName);
        }
    }
    let stdObj = new Student();
    stdObj.fullName1();  // this = Student
    stdObj.fullName2();  // this = Student

   setTimeout( stdObj.fullName1 , 4000 );  // this = Window
   setTimeout( stdObj.fullName2 , 8000 );  // this = Student


   // In Arrow Function No Matter From where the function is called, this = where the function is written
</script>
