<script>
    let a = 10;
    let b = 10;
    console.log(a == b); // true

    let str1 = 'hello';
    let str2 = 'hello';
    console.log(str1 == str2); // true

    console.log(null == null); // true 
    //  value check - proves 'null' is a primitive value


    console.log({} == {});  // false - Reference check
    console.log([10, 20] == [10, 20]);  // false - Reference check
</script>
