<script>
    // Template Literal / String Interpolation
    let a = 10;
    let b = 20;

    // ES_5 : String Concat
    console.log('Addition of ' + a + ' and ' + b + ' is: ' + (a + b));
    // More Error Prone

    // ES_6  : string interpolation
    console.log(`Addition of ${a} and ${b} is: ${a + b}`)
</script>
